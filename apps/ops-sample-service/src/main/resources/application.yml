server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ops-sample-service

ops:
  evidence-files:
    root: ${OPS_EVIDENCE_FILE_ROOT:/mnt/ops-sample/files}

logging:
  level:
    root: INFO
    io.github.siamese_lang.ops: INFO
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%X{requestId:-no-request-id}] %logger{36} - %msg%n"
