---
- name: Configure lab-full-ops app NFS client mount
  hosts: app
  become: true
  gather_facts: true

  tasks:
    - name: Show app NFS mount target
      ansible.builtin.debug:
        msg:
          inventory_host: "{{ inventory_hostname }}"
          nfs_source: "{{ lab_full_ops_app_nfs_source }}"
          mount_path: "{{ lab_full_ops_app_nfs_mount_path }}"
          mount_options: "{{ lab_full_ops_app_nfs_mount_options }}"

    - name: Install NFS client package
      ansible.builtin.apt:
        name: "{{ lab_full_ops_app_nfs_client_packages }}"
        state: present
        update_cache: true
      when: lab_full_ops_app_install_nfs_client_packages | bool

    - name: Ensure app NFS mount directory exists
      ansible.builtin.file:
        path: "{{ lab_full_ops_app_nfs_mount_path }}"
        state: directory
        owner: "{{ lab_full_ops_app_nfs_mount_owner }}"
        group: "{{ lab_full_ops_app_nfs_mount_group }}"
        mode: "{{ lab_full_ops_app_nfs_mount_mode }}"

    - name: Ensure app NFS mount is present in fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '^.*\s+{{ lab_full_ops_app_nfs_mount_path }}\s+nfs\s+'
        line: "{{ lab_full_ops_app_nfs_source }} {{ lab_full_ops_app_nfs_mount_path }} {{ lab_full_ops_app_nfs_fstype }} {{ lab_full_ops_app_nfs_mount_options }} 0 0"
        state: present
        create: false
        backup: true

    - name: Mount app NFS path from fstab entry
      ansible.builtin.command: "mount {{ lab_full_ops_app_nfs_mount_path }}"
      register: lab_full_ops_app_nfs_mount_command
      changed_when: lab_full_ops_app_nfs_mount_command.rc == 0
      failed_when:
        - lab_full_ops_app_nfs_mount_command.rc != 0
        - "'already mounted' not in lab_full_ops_app_nfs_mount_command.stderr"

    - name: Verify app NFS mountpoint
      ansible.builtin.command: "mountpoint -q {{ lab_full_ops_app_nfs_mount_path }}"
      changed_when: false

    - name: Display app NFS mount details
      ansible.builtin.command: "findmnt --target {{ lab_full_ops_app_nfs_mount_path }} --output SOURCE,TARGET,FSTYPE,OPTIONS --noheadings"
      changed_when: false
      register: lab_full_ops_app_nfs_findmnt

    - name: Write app NFS probe file
      ansible.builtin.copy:
        dest: "{{ lab_full_ops_app_nfs_write_probe_file }}"
        mode: "0644"
        content: |
          project={{ project_name }}
          environment={{ environment_name }}
          inventory_hostname={{ inventory_hostname }}
          nfs_source={{ lab_full_ops_app_nfs_source }}
          mount_path={{ lab_full_ops_app_nfs_mount_path }}
      when: lab_full_ops_app_nfs_write_probe_enabled | bool

    - name: Read app NFS probe file
      ansible.builtin.command: "cat {{ lab_full_ops_app_nfs_write_probe_file }}"
      changed_when: false
      register: lab_full_ops_app_nfs_probe
      when: lab_full_ops_app_nfs_write_probe_enabled | bool

    - name: Display app NFS evidence
      ansible.builtin.debug:
        msg:
          findmnt: "{{ lab_full_ops_app_nfs_findmnt.stdout }}"
          probe_file: "{{ lab_full_ops_app_nfs_probe.stdout_lines | default([]) }}"
