---
# Restore ops-sample-service to the normal lab-full-ops runtime profile after
# the bounded connection-pressure validation window.
#
# This is intentionally separate from the pressure validation playbook so a
# failed validation can still be followed by an explicit restore step.
#
# Required runtime secret:
#   - ops_db_password supplied from ignored inventory, --extra-vars, or Vault.

- import_playbook: lab-full-min-ops-sample-service.yml
  vars:
    ops_app_deployment_slot: stable
    ops_tomcat_threads_max: 200
    ops_tomcat_threads_min_spare: 10
    ops_tomcat_accept_count: 100
    ops_tomcat_connection_timeout: 20s
    ops_hikari_max_pool_size: 10
    ops_hikari_min_idle: 1
    ops_hikari_connection_timeout_ms: 30000
    ops_hikari_idle_timeout_ms: 600000
    ops_hikari_max_lifetime_ms: 1800000
