---
# CI-only inventory for Ansible syntax checks.
#
# This file intentionally uses local dummy hosts and does not represent a real
# runtime environment. It exists so GitHub Actions can parse high-value
# playbooks without requiring AWS instances, SSH keys, private IPs, or secrets.
all:
  vars:
    ansible_connection: local
    ansible_python_interpreter: /usr/bin/python3
    project_name: multitier-ops-platform
    environment_name: ci-syntax
    validation_profile: ci

    ops_app_name: ops-sample-service
    ops_app_user: opsapp
    ops_app_group: opsapp
    ops_app_home: /opt/ops-sample-service
    ops_app_config_dir: /etc/ops-sample-service
    ops_app_log_dir: /var/log/ops-sample-service
    ops_app_jar_name: ops-sample-service.jar
    ops_app_jar_dest: /opt/ops-sample-service/ops-sample-service.jar
    ops_app_java_package: openjdk-17-jre-headless
    ops_app_port: 8080
    ops_app_version: "0.1.0-ci"
    ops_app_environment: ci-syntax
    ops_app_node_role: app
    ops_app_node_tier: private-was
    ops_app_jar_url: ""
    ops_app_jar_source_path: ""
    ops_app_deployment_id: ci-syntax
    ops_app_deployment_slot: ci
    ops_app_deployed_at: ci
    ops_app_artifact_sha256: ci-not-runtime
    ops_app_artifact_source: ci-local

    ops_tomcat_threads_max: 200
    ops_tomcat_threads_min_spare: 10
    ops_tomcat_accept_count: 100
    ops_tomcat_connection_timeout: 20s

    ops_db_host: 127.0.0.1
    ops_db_port: 5432
    ops_db_name: opsdb
    ops_db_user: ops_user
    ops_db_password: ci-placeholder-password
    ops_db_url: jdbc:postgresql://127.0.0.1:5432/opsdb

    ops_hikari_max_pool_size: 10
    ops_hikari_min_idle: 1
    ops_hikari_connection_timeout_ms: 30000
    ops_hikari_idle_timeout_ms: 600000
    ops_hikari_max_lifetime_ms: 1800000

    ops_evidence_file_root: /tmp/ops-sample/files
    ops_app_expect_db_ready: false
    ops_app_healthcheck_url: http://127.0.0.1:8080/healthz
    ops_app_readycheck_url: http://127.0.0.1:8080/readyz
    ops_app_node_url: http://127.0.0.1:8080/node
    ops_app_version_url: http://127.0.0.1:8080/version
    ops_app_work_orders_summary_url: http://127.0.0.1:8080/api/work-orders/summary
    ops_app_report_dir: /tmp/multitier-ops-platform
    ops_app_report_file: /tmp/multitier-ops-platform/ci-ops-sample-service.txt

    lab_full_ops_app_nfs_mount_path: /tmp/ops-sample/files
    lab_full_ops_app_nfs_export_path: /tmp/ops-sample/files
    lab_full_ops_app_nfs_server_host: 127.0.0.1

  children:
    web:
      hosts:
        nginx-01:
          ansible_host: 127.0.0.1
          node_role: web
          node_tier: public-web
    app:
      hosts:
        app-01:
          ansible_host: 127.0.0.1
          node_role: was
          node_tier: private-app
    db:
      hosts:
        db-primary-01:
          ansible_host: 127.0.0.1
          node_role: db
          node_tier: private-db
    storage:
      hosts:
        nfs-01:
          ansible_host: 127.0.0.1
          node_role: storage
          node_tier: private-storage
    backup:
      hosts:
        backup-01:
          ansible_host: 127.0.0.1
          node_role: backup
          node_tier: private-ops
    monitoring:
      hosts:
        mon-01:
          ansible_host: 127.0.0.1
          node_role: monitoring
          node_tier: private-ops
    lab_full_ops:
      children:
        web: {}
        app: {}
        db: {}
        storage: {}
        backup: {}
        monitoring: {}
