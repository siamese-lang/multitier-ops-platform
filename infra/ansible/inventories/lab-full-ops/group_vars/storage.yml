---
# Storage-tier defaults for lab-full-ops nfs-01.
# Runtime execution requires package access on nfs-01. In the default no-NAT
# Free Tier profile, run this only during a batched validation window where the
# package-install strategy is intentionally available.

nfs_manage_packages: true
nfs_manage_service: true

nfs_server_package: nfs-kernel-server
nfs_server_service: nfs-server

nfs_export_root: /srv/ops-sample/files

# Keep root_squash enabled on the export. During the runtime validation, app-side
# writes are performed through the NFS mount and root is mapped to the anonymous
# identity. The export root therefore has to be writable by the squashed identity;
# otherwise the mount succeeds but the application cannot create evidence files.
nfs_export_owner: nobody
nfs_export_group: nogroup
nfs_export_mode: "0777"

nfs_export_file: /etc/exports.d/multitier-ops-platform.exports
nfs_export_options: rw,sync,no_subtree_check,root_squash

# Source lab default CIDRs from the lab-full-ops Terraform profile.
lab_full_ops_default_app_cidr: "10.50.11.0/24"
lab_full_ops_default_backup_cidr: "10.50.41.0/24"

# Restore-lab CIDRs from the restore-lab recovery Terraform profile.
# These are selected automatically when environment_name=restore-lab.
restore_lab_app_cidr: "10.60.11.0/24"
restore_lab_backup_cidr: "10.60.41.0/24"

nfs_export_app_cidr: "{{ restore_lab_app_cidr if environment_name | default('lab-full-ops') == 'restore-lab' else lab_full_ops_default_app_cidr }}"
nfs_export_backup_cidr: "{{ restore_lab_backup_cidr if environment_name | default('lab-full-ops') == 'restore-lab' else lab_full_ops_default_backup_cidr }}"

nfs_export_allowed_cidrs:
  - "{{ nfs_export_app_cidr }}"
  - "{{ nfs_export_backup_cidr }}"

nfs_validation_commands:
  - exportfs -v
  - systemctl is-active nfs-server
