---
# PostgreSQL primary defaults for lab-full-ops.
# Do not put real production secrets in this file.

postgresql_version: "14"
postgresql_cluster_name: main
postgresql_service_name: postgresql

postgresql_conf_dir: "/etc/postgresql/{{ postgresql_version }}/{{ postgresql_cluster_name }}"
postgresql_data_dir: "/var/lib/postgresql/{{ postgresql_version }}/{{ postgresql_cluster_name }}"
postgresql_listen_addresses: "*"
postgresql_port: 5432

# lab-full-ops Terraform default private app subnet CIDR.
# The existing PostgreSQL playbook still reads this legacy variable name.
# Keep it as an alias until the shared DB playbook is generalized.
lab_full_min_app_cidr: "10.50.11.0/24"
lab_full_ops_app_cidr: "{{ lab_full_min_app_cidr }}"

# lab-full-ops Terraform default private ops subnet CIDR.
# backup-01 uses this network to run pg_dump against db-primary-01.
lab_full_ops_backup_cidr: "10.50.41.0/24"
postgresql_additional_client_cidrs:
  - "{{ lab_full_ops_backup_cidr }}"

ops_db_name: opsdb
ops_db_user: ops_user

# Supply this from ignored hosts.yml, --extra-vars, or future Ansible Vault.
# Example:
# ansible-playbook ... -e 'ops_db_password=<strong-local-password>'
ops_db_password: ""

postgresql_log_min_duration_statement_ms: 500
postgresql_report_dir: /tmp/multitier-ops-platform
postgresql_report_file: "{{ postgresql_report_dir }}/lab-full-ops-postgresql-primary-{{ inventory_hostname }}.txt"
