name: Evidence
description: Evidence collection or verification record
title: "[EVIDENCE] "
labels: ["evidence"]
body:
  - type: textarea
    id: scenario
    attributes:
      label: Scenario
      description: What was verified?
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: lab-small, lab-full, local, restore-lab, etc.
    validations:
      required: true
  - type: textarea
    id: commands
    attributes:
      label: Commands
      description: Commands executed during verification
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence links or excerpts
      description: Link docs/03-evidence files or paste sanitized excerpts
    validations:
      required: true
  - type: textarea
    id: conclusion
    attributes:
      label: Conclusion
    validations:
      required: true
