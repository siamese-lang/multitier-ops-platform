name: ops-sample-service-ci

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/ops-sample-service/**"
      - ".github/workflows/ops-sample-service-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/ops-sample-service/**"
      - ".github/workflows/ops-sample-service-ci.yml"

permissions:
  contents: read

jobs:
  build:
    name: Build ops sample service
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/ops-sample-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: ops-sample-service-0.1.0-jar
          path: apps/ops-sample-service/target/ops-sample-service-0.1.0.jar
          if-no-files-found: error
          retention-days: 7
